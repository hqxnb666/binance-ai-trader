name: Unpack Project Snapshot

on:
  push:
    paths:
      - project_snapshot.tar.gz.b64

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Unpack sanitized project snapshot
        shell: bash
        run: |
          set -euo pipefail
          base64 -d project_snapshot.tar.gz.b64 > project_snapshot.tar.gz
          tar -xzf project_snapshot.tar.gz
          rm -f project_snapshot.tar.gz project_snapshot.tar.gz.b64
          rm -f .github/workflows/unpack-snapshot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Upload Binance AI Trader project" || exit 0
          git push
